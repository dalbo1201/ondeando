      texto: "Reconfigurei a lista do [REGISTRO DE ALTERAÇÕES](/registro-de-alteracoes) e do [BLOGROL](/blogrol) para um loop dinâmico através do `Liquid` para que eu preencha uma lista no arquivo `atualizacao.yml` e `blogrol.yml`, respectivamente, e assim fique mais fácil de preencher sem ficar repetindo tanto o HTML."

