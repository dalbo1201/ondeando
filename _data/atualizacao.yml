    - tags: ["acabamento"]
      texto: "Adicionei uma mensagem para que copiem e colem o email do link `mailto` caso o link não funcione. Aparentemente tem muita gente, principalmente no computador, que o link `mailto` fica quebrado, não encontra o aplicativo padrão para seu funcionamento.\n\nA web está doente.🥲"

