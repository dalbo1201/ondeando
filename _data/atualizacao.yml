  entradas:
    - tags: ["Jekyll"]
      texto: "Revisei o `_config.yml` para aparecer o autor do blog no FEED para os leitores me identificarem."

- ano: "2025"
  data_id: "2025-04-11"
  data_texto: "11 de abril"
  entradas:
    - tags: ["css", "html", "jekyll", "liquid", "novidade", "página"]
      texto: "Revisei o `_config.yml` para permitir o uso de tags no blog. Criei a página de [TAGS](/etiquetas) para guardar os posts _etiquetados_ e no topo da página uma _nuvem de tags_."
    - tags: ["acabamento", "tipografia"]
      texto: "Troquei a fonte do site para a [Montserrat](https://fonts.google.com/specimen/Montserrat) usando o Google Fonts."

