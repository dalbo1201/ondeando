- ano: "2025"
  data_id: "2025-04-02"
  data_texto: "02 de abril"
  entradas:
    - tags: ["css", "html", "jekyll"]
      texto: "Configurei o estilo no css para que as postagens de citações de frases tenham a configuração associada ao `post type` no `front metter`."

- ano: "2025"
  data_id: "2025-03-21"
  data_texto: "21 de março"
  entradas:
