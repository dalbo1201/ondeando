       A ideia é que seja um espaço para colocar coisas que não se encaixam no formato tradicional de postagem do blog que ainda queira compartilhar. Com um estilo mais simples, como são Bluesky e Mastodon.
    - tags: ["acabamento"]
      texto: |
       Adicionei o selo dos [Blogueiros Raiz](https://blogueirosraiz.com/) no rodapé do site.

- ano: "2026"
