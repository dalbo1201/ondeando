- ano: "2025"
  data_id: "2025-03-16"
  data_texto: "16 de março"
  entradas:
    - tags: ["acabamento"]
      texto: "Coloquei o aviso de _não tem comentário no blog, mas podemos conversar por email_. Não foram essas palavras, mas essa é a ideia."

- ano: "2025"
  data_id: "2025-03-11"
