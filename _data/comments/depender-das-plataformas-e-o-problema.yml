    Usei muito o TV time, mas estava incomodado com ele e já andava num processo de guardar comigo o que é importante para mim. Comecei tirando tudo do Evernote tem uns anos e na época só achei o Obsidian, que roda em Linux, Windows, etc. Uso até hoje e passei a registrar nele também filmes, séries e filmes que vejo.

    Até acho bom, mas se estivesse decidindo hoje talvez adotasse um FOSS como o LogSeq ou o Zettlr, que são meio estranhos, mas é só acostumar.

    Ah! Usei a ferramenta de backup do TV Time, mas ele me mandou um monte de CSV sem documentação e mal estruturado. Guardei tudo e carreguei numa planilha para analisar depois e nunca mais tive tempo.
